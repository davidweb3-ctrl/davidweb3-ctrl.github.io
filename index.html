    <title>David Xia Web3 Proof Hub</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --ink: #111827;
        --muted: #5d6675;
        --line: #dce2ea;
        --blue: #0052ff;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 56px 20px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--blue);
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 680px;
        font-size: clamp(34px, 7vw, 56px);
        line-height: 1.04;
      }

      .lead {
        max-width: 680px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 18px;
      }

      .links {
        display: grid;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        display: block;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        font-weight: 700;
        text-decoration: none;
      }

      a span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>

      <p class="lead">

      </p>
      <div class="links">

        </a>
        <a href="https://github.com/davidweb3-ctrl/base-contract-qa-starter">

          <span>Source code, tests, checklist, and deployment notes.</span>
        </a>
      </div>
    </main>
